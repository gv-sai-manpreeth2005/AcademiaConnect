<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Activities | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container py-5">
    <div th:if="${successMessage}"
     class="alert alert-success"
     th:text="${successMessage}">
</div>

    <h2 class="mb-4">My Organized Activities</h2>

    <div th:if="${#lists.isEmpty(activities)}"
         class="alert alert-info">
        You have not created any activities.
    </div>

    <table th:unless="${#lists.isEmpty(activities)}"
           class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>Activity</th>
            <th>Type</th>
            <th>Date</th>
            <th>Capacity</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="activity : ${activities}">

            <td th:text="${activity.title}">Activity</td>

            <td th:text="${activity.type}">WORKSHOP</td>

            <td th:text="${#temporals.format(activity.dateTime, 'dd MMM yyyy, hh:mm a')}">
                Date
            </td>

            <td th:text="${activity.capacity}">0</td>

          <td>
    <a th:href="@{/organizer/activities/{id}/edit(id=${activity.id})}"
       class="btn btn-sm btn-success me-1">
        Edit
    </a>

    <a th:href="@{/organizer/activities/{id}/participants(id=${activity.id})}"
       class="btn btn-sm btn-warning me-1">
        View Participants
    </a>

    <a th:href="@{/organizer/activities/{id}/feedback(id=${activity.id})}"
       class="btn btn-sm btn-info me-1">
        View Feedback
    </a>

    <form th:if="${activity.status.name() != 'CANCELLED'}"
          th:action="@{/organizer/activities/{id}/cancel(id=${activity.id})}"
          method="post"
          class="d-inline">

        <button type="submit"
                class="btn btn-sm btn-danger"
                onclick="return confirm('Cancel this activity?')">
            Cancel
        </button>
    </form>

    <span th:if="${activity.status.name() == 'CANCELLED'}"
          class="badge bg-danger">
        CANCELLED
    </span>
</td>

        </tr>

        </tbody>

    </table>

 <a th:href="@{/organizer}" class="btn btn-primary mt-3">
    Back to Organizer Dashboard
</a>

</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
