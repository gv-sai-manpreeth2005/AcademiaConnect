<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Activity | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">Create New Activity</h2>

    <form th:action="@{/activities/create}" th:object="${activity}" method="post">

        <div class="mb-3">
            <label>Title</label>
            <input type="text" class="form-control" th:field="*{title}">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>

        <div class="mb-3">
            <label>Location</label>
            <input type="text" class="form-control" th:field="*{location}">
        </div>

        <div class="mb-3">
            <label>Capacity</label>
            <input type="number" class="form-control" th:field="*{capacity}">
        </div>

        <button class="btn btn-primary">
            Create Activity
        </button>

    </form>

</div>

</body>

</html>
