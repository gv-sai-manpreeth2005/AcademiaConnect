<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Activity Details | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="card shadow-lg border-0">

        <div class="card-body">

            <span class="badge bg-primary mb-3"
                  th:text="${activity.type}">
            </span>

            <h2 th:text="${activity.title}"></h2>

            <p class="text-muted"
               th:text="${activity.description}">
            </p>

            <hr>

            <p>
                <strong>Location:</strong>
                <span th:text="${activity.location}"></span>
            </p>

            <p>
                <strong>Date:</strong>
                <span th:text="${activity.dateTime}"></span>
            </p>

            <p>
                <strong>Capacity:</strong>
                <span th:text="${activity.capacity}"></span>
            </p>

            <a th:href="@{/activities}"
               class="btn btn-secondary">
                Back
            </a>

            <button class="btn btn-success">
                Register
            </button>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
