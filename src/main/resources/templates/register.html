<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-person-plus-fill display-3 text-primary"></i>

                        <h2 class="fw-bold mt-3">Create Your Account</h2>

                        <p class="text-muted">
                            Join Academia Connect
                        </p>

                    </div>

                    <form th:action="@{/register}"
      th:object="${registerRequest}"
      method="post">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
       class="form-control"
       th:field="*{fullName}"
       placeholder="Enter Full Name">

<div class="text-danger small"
     th:if="${#fields.hasErrors('fullName')}"
     th:errors="*{fullName}">
</div>
                        </div>

                 <div class="mb-3">
    <label class="form-label">Username</label>

    <input type="text"
           class="form-control"
           th:field="*{username}"
           placeholder="Enter Username">

    <small class="text-muted">
        Username must be between 3 and 50 characters.
    </small>

    <div class="text-danger small"
         th:if="${#fields.hasErrors('username')}"
         th:errors="*{username}">
    </div>


                        <div class="mb-3">
    <label class="form-label">Email</label>

    <input type="email"
           class="form-control"
           th:field="*{email}"
           placeholder="Enter Email">

    <small class="text-muted">
        Enter a valid email address (e.g., abc@example.com).
    </small>

    <div class="text-danger small"
         th:if="${#fields.hasErrors('email')}"
         th:errors="*{email}">
  
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select"
        th:field="*{department}">
<option value="">Select Department</option>
<option value="Computer Science">Computer Science</option>
<option value="Information Technology">Information Technology</option>
<option value="Electronics">Electronics</option>
<option value="Mechanical">Mechanical</option>
<option value="Civil">Civil</option>
<option value="Business Administration">Business Administration</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Role</label>
                             <select class="form-select"
        th:field="*{role}">
<option value="USER">User</option>
<option value="ORGANIZER">Organizer</option>
                            </select>
                        </div>

                        <div class="mb-3">
    <label class="form-label">Password</label>

    <input type="password"
           class="form-control"
           th:field="*{password}"
           placeholder="Enter Password">

    <small class="text-muted">
        Password must be at least 8 characters long.
    </small>

    <div class="text-danger small"
         th:if="${#fields.hasErrors('password')}"
         th:errors="*{password}">
    </div>
</div>

                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="password"
       class="form-control"
       th:field="*{confirmPassword}"
       placeholder="Confirm Password">
                        </div>

                        <button class="btn btn-primary w-100">
                            Create Account
                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Already have an account?
                        <a th:href="@{/login}">Login</a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
