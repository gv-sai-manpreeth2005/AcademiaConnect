<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Invalid Certificate | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5 text-center">

                    <i class="bi bi-x-circle-fill display-1 text-danger"></i>

                    <h2 class="fw-bold mt-3">
                        Invalid Certificate
                    </h2>

                    <p class="text-muted mt-3">
                        The certificate code you entered could not be verified.
                    </p>

                    <p class="mb-4">
                        <strong>Entered Code:</strong>
                        <span th:text="${certificateCode}">CERT-XXXXXXX</span>
                    </p>

                    <div class="alert alert-danger">
                        This certificate does not exist or the code is invalid.
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-4 flex-wrap">

                        <a th:href="@{/certificates/verify}"
                           class="btn btn-primary">
                            Verify Another Certificate
                        </a>

                        <a th:href="@{/}"
                           class="btn btn-outline-secondary">
                            Back to Home
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
