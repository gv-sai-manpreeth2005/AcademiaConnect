<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Waitlist | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div th:if="${successMessage}"
     class="alert alert-success"
     th:text="${successMessage}">
</div>

<div th:if="${errorMessage}"
     class="alert alert-danger"
     th:text="${errorMessage}">
</div>

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold">
                <i class="bi bi-hourglass-split text-warning"></i>
                My Waitlist
            </h2>

            <p class="text-muted mb-0">
                Activities for which you are currently waitlisted.
            </p>
        </div>

        <a th:href="@{/activities}" class="btn btn-primary">
            Browse Activities
        </a>

    </div>

    <div th:if="${#lists.isEmpty(waitlistEntries)}"
         class="alert alert-info text-center">

        You are not currently waitlisted for any activity.

    </div>

    <div class="card shadow-sm border-0"
         th:unless="${#lists.isEmpty(waitlistEntries)}">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-light">
                    <tr>
                        <th>Activity</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Queue Position</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="entry : ${waitlistEntries}">

                        <td th:text="${entry.activity.title}">
                            Activity Title
                        </td>

                        <td th:text="${entry.activity.type}">
                            WORKSHOP
                        </td>

                        <td th:text="${#temporals.format(entry.activity.dateTime, 'dd MMM yyyy, hh:mm a')}">
                            Date
                        </td>

                        <td>
                            <span class="badge bg-warning text-dark"
                                  th:text="${entry.queuePosition}">
                                1
                            </span>
                        </td>

                        <td>
                            <span class="badge bg-warning text-dark"
                                  th:text="${entry.status}">
                                WAITING
                            </span>
                        </td>

                       <td>
    <a th:href="@{/activities/{id}(id=${entry.activity.id})}"
       class="btn btn-sm btn-outline-primary me-1">
        View Activity
    </a>

    <form th:if="${entry.status.name() == 'WAITING'}"
          th:action="@{/my-waitlist/cancel/{id}(id=${entry.id})}"
          method="post"
          class="d-inline">

        <button type="submit"
                class="btn btn-sm btn-outline-danger"
                onclick="return confirm('Cancel this waitlist entry?')">
            Cancel
        </button>
    </form>
</td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
