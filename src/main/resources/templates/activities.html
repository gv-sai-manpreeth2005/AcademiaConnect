<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Browse Activities | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h1 class="fw-bold mb-3">Browse Activities</h1>

    <p class="text-muted mb-4">
        Discover academic events, workshops, seminars and competitions.
    </p>

    <!-- Empty State -->
    <div class="text-center py-5"
         th:if="${#lists.isEmpty(activities)}">

        <i class="bi bi-calendar-x display-1 text-primary"></i>

        <h3 class="mt-4">No Activities Available</h3>

        <p class="text-muted">
            There are currently no academic activities available.
            Please check back later.
        </p>

    </div>

    <!-- Activity Cards -->
    <div class="row g-4"
         th:unless="${#lists.isEmpty(activities)}">

        <div class="col-lg-4 col-md-6"
             th:each="activity : ${activities}">

            <div class="card h-100 shadow-sm border-0 rounded-4">

                <div class="card-body">

                    <span class="badge bg-primary mb-3"
                          th:text="${activity.type}">
                        Workshop
                    </span>

                    <h4 th:text="${activity.title}">
                        Activity Title
                    </h4>

                    <p class="text-muted"
                       th:text="${activity.description}">
                        Description
                    </p>

                    <hr>

                    <p>
                        <i class="bi bi-geo-alt"></i>
                        <span th:text="${activity.location}"></span>
                    </p>

                    <p>
                        <i class="bi bi-calendar-event"></i>
                        <span th:text="${activity.dateTime}"></span>
                    </p>

                    <a class="btn btn-primary w-100">
                        View Details
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
