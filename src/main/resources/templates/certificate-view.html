<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Certificate | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .certificate {
            background: white;
            border: 10px double #212529;
            padding: 60px;
            text-align: center;
            max-width: 1000px;
            margin: auto;
        }

        .certificate-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .participant-name {
            font-size: 38px;
            font-weight: bold;
            margin: 25px 0;
        }

        .activity-name {
            font-size: 28px;
            font-weight: 600;
        }

        @media print {
            .no-print {
                display: none;
            }

            body {
                background: white;
            }

            .certificate {
                box-shadow: none;
                border: 10px double black;
            }
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="certificate shadow">

        <h3 class="text-uppercase">Academia Connect</h3>

        <div class="certificate-title mt-4">
            Certificate of Participation
        </div>

        <p class="mt-4 fs-5">
            This certificate is proudly presented to
        </p>

        <div class="participant-name"
             th:text="${certificate.user.fullName}">
            Participant Name
        </div>

        <p class="fs-5">
            for successfully participating in
        </p>

        <div class="activity-name"
             th:text="${certificate.activity.title}">
            Activity Name
        </div>

        <p class="mt-4">
            Activity Date:
            <strong th:text="${#temporals.format(
                    certificate.activity.dateTime,
                    'dd MMM yyyy'
                )}">
                Date
            </strong>
        </p>

        <p>
            Issue Date:
            <strong th:text="${certificate.issueDate}">
                Date
            </strong>
        </p>

        <p class="mt-4">
            Certificate Code:
            <strong th:text="${certificate.certificateCode}">
                CERT-CODE
            </strong>
        </p>

        <div class="row mt-5">

            <div class="col-6">
    <p class="fw-bold fs-5 mb-1"
       th:text="${certificate.activity.organizer.fullName}">
        Organizer Name
    </p>

    <hr>

    <p>Organizer Signature</p>
</div>

            <div class="col-6">
                <hr>
                <p>Academia Connect</p>
            </div>

        </div>

    </div>

    <div class="text-center mt-4 no-print">

        <button onclick="window.print()"
                class="btn btn-primary">
            Print / Save as PDF
        </button>

        <a th:href="@{/my-certificates}"
           class="btn btn-secondary ms-2">
            Back
        </a>

    </div>

</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
