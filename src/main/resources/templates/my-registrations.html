<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Registrations | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div th:if="${successMessage}"
         class="alert alert-success"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}"
         class="alert alert-danger"
         th:text="${errorMessage}">
    </div>

    <h2 class="mb-4">My Registrations</h2>

    <div th:if="${#lists.isEmpty(registrations)}"
         class="alert alert-info">
        You have not registered for any activities.
    </div>

    <table th:unless="${#lists.isEmpty(registrations)}"
           class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>Activity</th>
            <th>Type</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="registration : ${registrations}">

            <td th:text="${registration.activity.title}">
                Activity
            </td>

            <td th:text="${registration.activity.type}">
                WORKSHOP
            </td>

            <td th:text="${registration.status}">
                REGISTERED
            </td>

            <td th:text="${#temporals.format(
                    registration.activity.dateTime,
                    'dd MMM yyyy, hh:mm a'
                )}">
                Date
            </td>

            <td>
                <a th:href="@{/activities/{id}(id=${registration.activity.id})}"
                   class="btn btn-sm btn-outline-primary me-1">
                    View Activity
                </a>
<a th:href="@{/activities/{id}/feedback(id=${registration.activity.id})}"
   class="btn btn-sm btn-outline-success me-1">
    Feedback
</a>
                <form th:if="${registration.status.name() == 'REGISTERED'}"
                      th:action="@{/my-registrations/cancel/{id}(id=${registration.id})}"
                      method="post"
                      class="d-inline">

                    <button type="submit"
                            class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Cancel this registration?')">
                        Cancel
                    </button>

                </form>
            </td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/dashboard}" class="btn btn-primary">
        Back to Dashboard
    </a>

</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
