<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Activity Feedback | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <h2 th:text="${activity.title}">
        Activity
    </h2>

    <p class="fs-5">
        Average Rating:
        <strong th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">
            0.0
        </strong>
        / 5
    </p>

    <div th:if="${#lists.isEmpty(feedbacks)}"
         class="alert alert-info">
        No feedback has been submitted yet.
    </div>

    <table th:unless="${#lists.isEmpty(feedbacks)}"
           class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>User</th>
            <th>Email</th>
            <th>Rating</th>
            <th>Comments</th>
            <th>Submitted At</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="feedback : ${feedbacks}">

            <td th:text="${feedback.user.fullName}">
                User
            </td>

            <td th:text="${feedback.user.email}">
                Email
            </td>

            <td th:text="${feedback.rating}">
                5
            </td>

            <td th:text="${feedback.comments}">
                Comments
            </td>

            <td th:text="${#temporals.format(
                    feedback.submittedAt,
                    'dd MMM yyyy, hh:mm a'
                )}">
                Date
            </td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/organizer/activities}"
       class="btn btn-primary">
        Back to Activities
    </a>

</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
