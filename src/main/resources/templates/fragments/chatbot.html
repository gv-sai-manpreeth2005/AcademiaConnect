<div th:fragment="chatbot">

    <button id="chatbot-toggle"
            class="btn btn-primary rounded-circle position-fixed"
            style="right: 25px; bottom: 25px; width: 58px; height: 58px; z-index: 1050;">
        <i class="bi bi-chat-dots-fill fs-4"></i>
    </button>

    <div id="chatbot-box"
         class="card shadow position-fixed d-none"
         style="right: 25px; bottom: 95px; width: 340px; z-index: 1050;">

        <div class="card-header bg-primary text-white d-flex justify-content-between">
            <strong>Academic Event Assistant</strong>

            <button id="chatbot-close"
                    type="button"
                    class="btn-close btn-close-white">
            </button>
        </div>

        <div id="chatbot-messages"
             class="card-body overflow-auto"
             style="height: 280px;">

            <div class="alert alert-light mb-2">
                Hello ! Ask me about registration , waitlist , feedback or certificates.
            </div>
<div class="d-flex flex-wrap gap-2 mb-3">

    <button type="button"
            class="btn btn-sm btn-outline-primary quick-question"
            data-question="How do I register?">
        Register
    </button>

    <button type="button"
            class="btn btn-sm btn-outline-warning quick-question"
            data-question="What is waitlist?">
        Waitlist
    </button>

    <button type="button"
            class="btn btn-sm btn-outline-success quick-question"
            data-question="How can I get certificate?">
        Certificate
    </button>

    <button type="button"
            class="btn btn-sm btn-outline-danger quick-question"
            data-question="What is schedule conflict?">
        Schedule Conflict
    </button>
    <button type="button"
        class="btn btn-sm btn-outline-dark quick-question"
        data-question="What is Academia Connect?">
    About 
</button>

<button type="button"
        class="btn btn-sm btn-outline-secondary quick-question"
        data-question="What can a user do?">
    User Features
</button>

<button type="button"
        class="btn btn-sm btn-outline-info quick-question"
        data-question="What can an organizer do?">
    Organizer Features
</button>

<button type="button"
        class="btn btn-sm btn-outline-danger quick-question"
        data-question="How do I cancel registration?">
    Cancel Registration
</button>

</div>
        </div>

        <div class="card-footer">
            <div class="input-group">

                <input id="chatbot-input"
                       type="text"
                       class="form-control"
                       placeholder="Type your question">

                <button id="chatbot-send"
                        class="btn btn-primary">
                    Send
                </button>

            </div>
        </div>

    </div>

    <script>
        const chatbotToggle = document.getElementById("chatbot-toggle");
        const chatbotBox = document.getElementById("chatbot-box");
        const chatbotClose = document.getElementById("chatbot-close");
        const chatbotSend = document.getElementById("chatbot-send");
        const chatbotInput = document.getElementById("chatbot-input");
        const chatbotMessages = document.getElementById("chatbot-messages");

        chatbotToggle.addEventListener("click", () => {
            chatbotBox.classList.remove("d-none");
        });

        chatbotClose.addEventListener("click", () => {
            chatbotBox.classList.add("d-none");
        });

        function getBotReply(message) {
    const text = message.toLowerCase();

    if (
        text.includes("academia connect") ||
        text.includes("about project") ||
        text.includes("what is this")
    ) {
        return "Academia Connect is a centralized academic event management platform for students and organizers.";
    }

    if (
        (text.includes("organizer") ||
         text.includes("organiser") ||
         text.includes("host")) &&
        (
            text.includes("do") ||
            text.includes("can") ||
            text.includes("feature") ||
            text.includes("work") ||
            text.includes("manage")
        )
    ) {
        return "Organizers can create activities, manage participants, view waitlists, mark attendance, issue certificates, view feedback and check analytics.";
    }

    if (
        (text.includes("user") ||
         text.includes("student") ||
         text.includes("participant")) &&
        (
            text.includes("do") ||
            text.includes("can") ||
            text.includes("feature") ||
            text.includes("work")
        )
    ) {
        return "Users can browse activities, register, join waitlists, cancel registrations, submit feedback and view certificates.";
    }

    if (
        text.includes("register") ||
        text.includes("registration") ||
        text.includes("join activity")
    ) {
        return "Open Browse Activities, select an activity and click Register.";
    }

    if (
        text.includes("waitlist") ||
        text.includes("waiting list") ||
        text.includes("queue")
    ) {
        return "When an activity is full, you are automatically added to the waitlist and given a queue position.";
    }

    if (
        text.includes("promotion") ||
        text.includes("promoted") ||
        text.includes("move from waitlist")
    ) {
        return "When a registered user cancels, the first waiting user is automatically promoted to REGISTERED.";
    }

    if (
        text.includes("cancel") ||
        text.includes("remove registration") ||
        text.includes("leave activity")
    ) {
        return "Open My Registrations or My Waitlist and click Cancel.";
    }

    if (
        text.includes("certificate") ||
        text.includes("download certificate") ||
        text.includes("print certificate")
    ) {
        return "Certificates are issued only to participants marked ATTENDED. Open My Certificates to view, print or save them as PDF.";
    }

    if (
        text.includes("verify") ||
        text.includes("certificate code") ||
        text.includes("valid certificate")
    ) {
        return "A certificate can be verified using its unique certificate code on the verification page.";
    }

    if (
        text.includes("feedback") ||
        text.includes("rating") ||
        text.includes("review")
    ) {
        return "Open My Registrations and click Feedback for the required activity.";
    }

    if (
        text.includes("attendance") ||
        text.includes("attended") ||
        text.includes("absent")
    ) {
        return "Organizers can mark registered participants as ATTENDED or ABSENT from the participants page.";
    }

    if (
        text.includes("conflict") ||
        text.includes("same time") ||
        text.includes("overlap")
    ) {
        return "If two activities have the same date and time, the system shows a warning. You may still choose Register Anyway.";
    }

    if (
        text.includes("analytics") ||
        text.includes("statistics") ||
        text.includes("dashboard data")
    ) {
        return "The organizer dashboard shows total activities, registrations, waiting users and average rating.";
    }

    return "Please ask about Academia Connect, users, organizers, registration, waitlist, cancellation, attendance, feedback, certificates, conflict detection or analytics.";
}
            

        function sendMessage() {
            const message = chatbotInput.value.trim();

            if (message === "") {
                return;
            }

            const userMessage = document.createElement("div");
            userMessage.className = "alert alert-primary text-end mb-2";
            userMessage.textContent = message;
            chatbotMessages.appendChild(userMessage);

            const botMessage = document.createElement("div");
            botMessage.className = "alert alert-light mb-2";
            botMessage.textContent = getBotReply(message);
            chatbotMessages.appendChild(botMessage);

            chatbotInput.value = "";
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }

        chatbotSend.addEventListener("click", sendMessage);

        chatbotInput.addEventListener("keydown", event => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
        document.querySelectorAll(".quick-question").forEach(button => {
    button.addEventListener("click", () => {
        chatbotInput.value = button.dataset.question;
        sendMessage();
    });
});
    </script>

</div>
