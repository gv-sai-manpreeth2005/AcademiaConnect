<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Certificate Verification | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-body p-5 text-center">

                    <i class="bi bi-patch-check-fill display-1 text-success"></i>

                    <h2 class="fw-bold mt-3 text-success">
                        Certificate Verified
                    </h2>

                    <p class="text-muted mb-4">
                        This certificate is valid and was issued by Academia Connect.
                    </p>

                    <hr>

                    <div class="row text-start mt-4">

                        <div class="col-md-6 mb-3">
                            <strong>Participant Name</strong>
                            <p th:text="${certificate.user.fullName}">
                                Participant Name
                            </p>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>Activity Name</strong>
                            <p th:text="${certificate.activity.title}">
                                Activity Name
                            </p>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>Organizer</strong>
                            <p th:text="${certificate.activity.organizer.fullName}">
                                Organizer Name
                            </p>
                        </div>

                        <div class="col-md-6 mb-3">
                            <strong>Issue Date</strong>
                            <p th:text="${certificate.issueDate}">
                                Issue Date
                            </p>
                        </div>

                        <div class="col-12 mb-3">
                            <strong>Certificate Code</strong>
                            <p class="fw-bold text-primary"
                               th:text="${certificate.certificateCode}">
                                CERT-CODE
                            </p>
                        </div>

                    </div>

                    <a th:href="@{/}"
                       class="btn btn-primary mt-3">
                        Back to Home
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
