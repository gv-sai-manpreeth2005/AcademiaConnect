<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Certificates | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">My Certificates</h2>

    <div th:if="${#lists.isEmpty(certificates)}"
         class="alert alert-info">
        No certificates have been issued yet.
    </div>

    <table th:unless="${#lists.isEmpty(certificates)}"
           class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>Activity</th>
            <th>Issue Date</th>
            <th>Certificate Code</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="certificate : ${certificates}">

            <td th:text="${certificate.activity.title}">
                Activity
            </td>

            <td th:text="${certificate.issueDate}">
                Date
            </td>

            <td th:text="${certificate.certificateCode}">
                Code
            </td>

            <td>
                <a th:href="@{/certificates/{id}(id=${certificate.id})}"
                   class="btn btn-sm btn-primary">
                    View Certificate
                </a>
            </td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/dashboard}" class="btn btn-secondary">
        Back to Dashboard
    </a>

</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
