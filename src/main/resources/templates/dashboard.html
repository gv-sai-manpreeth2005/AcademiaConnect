<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Welcome to Academia Connect</h1>
        <p class="text-muted">
            Manage your academic activities from one place.
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center">
                    <i class="bi bi-calendar-event display-4 text-primary"></i>
                    <h4 class="mt-3">Activities</h4>
                    <p>View all academic events and workshops.</p>

                    <a th:href="@{/activities}" class="btn btn-primary">
                        View Activities
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center">
                    <i class="bi bi-journal-check display-4 text-success"></i>
                    <h4 class="mt-3">Registrations</h4>
                    <p>Check your registered activities.</p>

                    <a th:href="@{/my-registrations}" class="btn btn-success">
    My Registrations
</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center">
                    <i class="bi bi-award display-4 text-warning"></i>
                    <h4 class="mt-3">Certificates</h4>
                    <p>Download earned certificates.</p>

                    <a th:href="@{/my-certificates}" class="btn btn-warning">
    View Certificates
</a>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center mt-5">

        <a th:href="@{/logout}" class="btn btn-danger">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
