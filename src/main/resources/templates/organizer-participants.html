<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Participants | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div th:if="${successMessage}"
         class="alert alert-success"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}"
         class="alert alert-danger"
         th:text="${errorMessage}">
    </div>

    <h2 class="mb-2" th:text="${activity.title}">
        Activity
    </h2>

    <p class="text-muted">
        Capacity:
        <span th:text="${activity.capacity}">0</span>
    </p>

    <h4 class="mt-4">Registered Participants</h4>

    <div th:if="${#lists.isEmpty(registrations)}"
         class="alert alert-info">
        No users are registered.
    </div>

    <table th:unless="${#lists.isEmpty(registrations)}"
           class="table table-bordered table-hover">

        <thead class="table-dark">
 <tr>
    <th>Name</th>
    <th>Username</th>
    <th>Email</th>
    <th>Status</th>
    <th>Attendance</th>
</tr>
        </thead>

        <tbody>
      <tr th:each="registration : ${registrations}">
    <td th:text="${registration.user.fullName}"></td>
    <td th:text="${registration.user.username}"></td>
    <td th:text="${registration.user.email}"></td>

    <td>
        <span class="badge"
              th:classappend="${
                  registration.status.name() == 'ATTENDED'
                  ? ' bg-success'
                  : registration.status.name() == 'ABSENT'
                  ? ' bg-danger'
                  : ' bg-primary'
              }"
              th:text="${registration.status}">
        </span>
    </td>

   <td>
    <div class="d-flex flex-wrap gap-2">

        <form th:action="@{/organizer/registrations/{id}/attendance(id=${registration.id})}"
              method="post"
              class="d-inline">

            <button type="submit"
                    name="status"
                    value="ATTENDED"
                    class="btn btn-sm btn-success">
                Attended
            </button>
        </form>

        <form th:action="@{/organizer/registrations/{id}/attendance(id=${registration.id})}"
              method="post"
              class="d-inline">

            <button type="submit"
                    name="status"
                    value="ABSENT"
                    class="btn btn-sm btn-danger">
                Absent
            </button>
        </form>

        <form th:if="${registration.status.name() == 'ATTENDED'}"
              th:action="@{/organizer/registrations/{id}/certificate(id=${registration.id})}"
              method="post"
              class="d-inline">

            <button type="submit"
                    class="btn btn-sm btn-primary">
                Issue Certificate
            </button>
        </form>

    </div>
</td>
</tr>
        </tbody>

    </table>

    <h4 class="mt-5">Waitlist</h4>

    <div th:if="${#lists.isEmpty(waitlistEntries)}"
         class="alert alert-info">
        No users are currently on the waitlist.
    </div>

    <table th:unless="${#lists.isEmpty(waitlistEntries)}"
           class="table table-bordered table-hover">

        <thead class="table-warning">
        <tr>
            <th>Position</th>
            <th>Name</th>
            <th>Username</th>
            <th>Email</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="entry : ${waitlistEntries}">
            <td th:text="${entry.queuePosition}"></td>
            <td th:text="${entry.user.fullName}"></td>
            <td th:text="${entry.user.username}"></td>
            <td th:text="${entry.user.email}"></td>
            <td th:text="${entry.status}"></td>
        </tr>
        </tbody>

    </table>

    <a th:href="@{/organizer/activities}"
   class="btn btn-primary mt-3">
    Back to Organizer Activities
</a>

</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
