<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Organizer Dashboard | Academia Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <h1 class="fw-bold mb-4">
        Organizer Dashboard
    </h1>

    <div class="row g-4 mb-4">

    <div class="col-md-3">
        <div class="card shadow-sm border-0 text-center h-100">
            <div class="card-body">
                <h6 class="text-muted">Total Activities</h6>
                <h2 class="fw-bold"
                    th:text="${totalActivities}">
                    0
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 text-center h-100">
            <div class="card-body">
                <h6 class="text-muted">Total Registrations</h6>
                <h2 class="fw-bold"
                    th:text="${totalRegistrations}">
                    0
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 text-center h-100">
            <div class="card-body">
                <h6 class="text-muted">Waiting Users</h6>
                <h2 class="fw-bold"
                    th:text="${totalWaitingUsers}">
                    0
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm border-0 text-center h-100">
            <div class="card-body">
                <h6 class="text-muted">Average Rating</h6>
                <h2 class="fw-bold">
                    <span th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">
                        0.0
                    </span>
                    / 5
                </h2>
            </div>
        </div>
    </div>

</div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-calendar-plus display-4 text-primary"></i>
                    <h4 class="mt-3">Create Activity</h4>
                   <a th:href="@{/activities/create}"
   class="btn btn-primary mt-2">
    Open
</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-pencil-square display-4 text-success"></i>
                    <h4 class="mt-3">Manage Activities</h4>
                    <a th:href="@{/activities}" class="btn btn-success mt-2">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-people display-4 text-warning"></i>
                    <h4 class="mt-3">Registrations</h4>
                    <a href="#" class="btn btn-warning mt-2">Open</a>
                </div>
            </div>
        </div>

    </div>

    <div class="row g-4 mt-3">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-award display-4 text-danger"></i>
                    <h4 class="mt-3">Certificates</h4>
                    <a href="#" class="btn btn-danger mt-2">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-chat-left-text display-4 text-info"></i>
                    <h4 class="mt-3">Feedback</h4>
                    <a href="#" class="btn btn-info mt-2">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-box-arrow-right display-4 text-secondary"></i>
                    <h4 class="mt-3">Logout</h4>
                    <a th:href="@{/logout}" class="btn btn-secondary mt-2">Logout</a>
                </div>
            </div>
        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
